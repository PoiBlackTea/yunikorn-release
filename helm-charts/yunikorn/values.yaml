# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

imagePullSecrets: []
serviceAccount: yunikorn-admin
hostNetwork: false

priorityClassName: ""

image:
  repository: apache/yunikorn
  tag: scheduler-latest
  pullPolicy: Always

nodeSelector: {}
tolerations: []
affinity: {}

admissionController:
  priorityClassName: ""
  image:
    repository: apache/yunikorn
    tag: admission-latest
    pullPolicy: Always
  replicaCount: 1
  serviceAccount: yunikorn-admission-controller
  hostNetwork: true
  resources:
    requests:
      cpu: 100m
      memory: 500Mi
    limits:
      cpu: 500m
      memory: 500Mi
  goMemoryLimitPercentage: 60
  goGC: 100
  nodeSelector: {}
  tolerations: []
  affinity: {}
  service:
    type: ClusterIP
  podLabels: {}
  podAnnotations: {}

web:
  image:
    repository: apache/yunikorn
    tag: web-latest
    pullPolicy: Always
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
    limits:
      cpu: 200m
      memory: 500Mi
  goMemoryLimitPercentage: 60
  goGC: 100

service:
  type: ClusterIP
  port: 9080
  portWeb: 9889

ingress:
  enabled: false
  ingressClassName: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths: []
  pathType: Prefix
  tls: []

# HTTPRoute configuration to expose the YuniKorn UI through the Gateway API.
# This requires the Gateway API CRDs to be installed on your cluster.
#
# When enabled is true, the HTTPRoute resource will be deployed.
# Note: You must configure `parentRefs` to attach the route to an existing Gateway.
httpRoute:
  enabled: false
  annotations: {}

  # At least one parentRef is required to attach the route to a Gateway.
  parentRefs: []
  #  - group: gateway.networking.k8s.io
  #    kind: Gateway
  #    name: yunikorn-gateway
  #    namespace: yunikorn

  # Hostnames to match for the HTTPRoute.
  hostnames: []
  #  - chart-example.local

  # Custom routing rules. If empty, a default rule mapping to the UI service is used.
  # rules: []

resources:
  requests:
    cpu: 200m
    memory: 1Gi
  limits:
    cpu: 4
    memory: 2Gi

# Percentage of the real memory limit of the container to which the GOMEMLIMIT variable is set
# GOMEMLIMIT variable sets a soft memory limit for the runtime to use in GC runs.
goMemoryLimitPercentage: 80

# Go garbage-collection threshold (GOGC) as a percentage of freshly allocated data to
# live data remaining after the previous GC.
goGC: 100

# Bootstrap configuration for YuniKorn - will be rendered into yunikorn-defaults ConfigMap.
# Any valid options for YuniKorn may be specified here.
# Example:
# yunikornDefaults:
#   service.placeholderImage: registry.k8s.io/pause:3.7
#   service.placeholderRunAsUser: 65534
#   service.placeholderRunAsGroup: 65534
#   service.placeholderFsGroup: 65534
#   admissionController.filtering.processNamespaces: "example"
#   admissionController.filtering.bypassNamespaces: "kube-system"
#   admissionController.filtering.labelNamespaces
#   admissionController.filtering.noLabelNamespaces
yunikornDefaults: {}

# When this flag is true, the admission controller will be installed along with the scheduler.
# When this flag is false, the admission controller will not be installed.
# Once the admission controller is installed, all traffic will be routing to yunikorn.
embedAdmissionController: true

# When this flag is true, the web service will be deployed.
# When this flag is false, the web service will not be deployed.
enableWebService: true

podLabels: {}
podAnnotations: {}
podSecurityContext: {}
schedulerSecurityContext: {}
webSecurityContext: {}
admissionPodSecurityContext: {}
admissionContainerSecurityContext: {}
